{{ define "main" }}
<article>
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <span class="date">{{ .Date.Format "2006-01-02 15:04" }}</span>
      {{ with .Params.tags }}
      <span class="tags">
        {{ range . }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="tag-pill-inline">[{{ . }}]</a>
        {{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <div class="post-nav">
    {{ with .PrevInSection }}<a href="{{ .Permalink }}">&lt; {{ .Title }}</a>{{ end }}
    {{ with .NextInSection }}<a href="{{ .Permalink }}" style="float:right;">{{ .Title }} &gt;</a>{{ end }}
  </div>
</article>
{{ end }}
