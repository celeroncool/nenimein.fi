# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Deploy site to Bunny CDN

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@master
        
      - name: Retrieve bitwarden secrets
        id: bwsecrets
        uses: bitwarden/sm-action@v2.2.0
        with:
          access_token: ${{ secrets.SM_ACCESS_TOKEN }}
          secrets: |
            7e2b536c-f7ce-42ef-8a14-b42b00f0d5ff > BUNNY_STORAGE_PASSWORD
            d41e9330-f13a-485a-a56a-b42901083b18 > BUNNY_API_ACCESS_KEY
  
      - name: Deploy to Edge Storage
        uses: own3d/bunny-action@main
        env:
          BUNNY_API_ACCESS_KEY: ${{ steps.bwsecrets.outputs.BUNNY_API_ACCESS_KEY }}
          BUNNY_STORAGE_HOSTNAME: se.storage.bunnycdn.com
          BUNNY_STORAGE_USERNAME: celeroncool-nenimein-fi
          BUNNY_STORAGE_PASSWORD: ${{ steps.bwsecrets.outputs.BUNNY_STORAGE_PASSWORD }}
          BUNNY_PULL_ZONE_ID: 5679250
        with:
          args: deploy --dir=public
